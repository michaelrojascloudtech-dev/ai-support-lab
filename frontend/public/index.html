<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>AI Support Lab Demo</title>
</head>

<body>
    <h1>AI Support Lab – Demo Client</h1>

    <label for="textInput">Text to process:</label>
    <br />
    <textarea id="textInput" rows="4" cols="50" placeholder="Type something here..."></textarea>
    <br /><br />

    <label for="debugInput">
        Debug mode (optional):
        <small>missing_text | invalid_api_key | rate_limit | server_error</small>
    </label>
    <br />
    <input id="debugInput" type="text" style="width: 320px;" placeholder="e.g. missing_text" />
    <br /><br />

    <button id="submitBtn">Send to API</button>

    <h2>Response</h2>
    <pre id="responseBox">(no response yet)</pre>

    <script>
        const button = document.getElementById("submitBtn");
        const textInput = document.getElementById("textInput");
        const debugInput = document.getElementById("debugInput");
        const responseBox = document.getElementById("responseBox");

        button.addEventListener("click", async () => {
            const text = textInput.value.trim();
            const debug = debugInput.value.trim();

            if (!text && !debug) {
                responseBox.textContent = "Please type some text or a debug mode.";
                return;
            }

            // Build the request body
            const body = {};
            if (text) body.text = text;
            if (debug) body.debug = debug;

            try {
                const res = await fetch("/api/process", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok) {
                    responseBox.textContent = "Error: " + (data.error || "Unknown error");
                    return;
                }

                responseBox.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                responseBox.textContent = "Network error: " + err.message;
            }
        });
    </script>
</body>

</html>
