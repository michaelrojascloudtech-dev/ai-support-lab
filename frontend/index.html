<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>AI Support Lab</title>
</head>

<body>
  <h1>AI Support Lab</h1>

  <div>
    <label for="text">Text:</label>
    <input type="text" id="text" />
  </div>

  <div>
    <label for="debug">Debug Flag:</label>
    <select id="debug">
      <option value="">none</option>
      <option value="missing_text">missing_text (400)</option>
      <option value="invalid_api_key">invalid_api_key (401)</option>
      <option value="rate_limit">rate_limit (429)</option>
      <option value="server_error">server_error (500)</option>
      <option value="forbidden">forbidden (403)</option>
      <option value="not_found">not_found (404)</option>
      <option value="request_timeout">request_timeout (408)</option>
      <option value="conflict_error">conflict_error (409)</option>
      <option value="unprocessable_entity">unprocessable_entity (422)</option>
      <option value="payload_too_large">payload_too_large (413)</option>

      <!-- NEW advanced flags -->
      <option value="gateway_timeout">gateway_timeout (504)</option>
      <option value="slow_200">slow_200 (slow 200 OK)</option>
      <option value="high_latency">high_latency (high latency 200)</option>
    </select>

  </div>

  <button id="send">Send</button>

  <h3>Response (status: <span id="status">-</span>)</h3>
  <pre id="output"></pre>

  <script>
    const textInput = document.getElementById("text");
    const debugSelect = document.getElementById("debug");
    const sendBtn = document.getElementById("send");
    const output = document.getElementById("output");
    const statusSpan = document.getElementById("status");

    sendBtn.addEventListener("click", async () => {
      const text = textInput.value;
      const debug = debugSelect.value; // <--- THIS is what we send

      const res = await fetch("/api/process", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ text, debug }), // <--- debug included
      });

      statusSpan.textContent = res.status;
      const data = await res.json();
      output.textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>

</html>
